kind = "web"
previewPath = "/"
title = "AI TRPG - Chronicle"
version = "1.0.0"
id = "artifacts/ai-trpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24974

[services.development]
run = "pnpm --filter @workspace/ai-trpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-trpg", "run", "build" ]
publicDir = "artifacts/ai-trpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24974"
BASE_PATH = "/"
